services:
  mysql:
    image: mysql:8.0
    container_name: betalent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: betalent
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: betalent-app
    restart: unless-stopped
    ports:
      - '3333:3333'
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3333
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_DATABASE=betalent
      - APP_KEY=${APP_KEY}
      - LOG_LEVEL=info
      - SESSION_DRIVER=memory
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  gateways:
    image: matheusprotzen/gateways-mock
    container_name: betalent-gateways
    ports:
      - '3001:3001'
      - '3002:3002'

volumes:
  mysql_data:
